name: Collect MCPs

on:
  schedule:
    - cron: '0 2 * * 0'  # 매주 일요일 새벽 2시 (UTC)
  workflow_dispatch:
    inputs:
      generate_descriptions:
        description: 'Claude API로 설명 자동 생성'
        type: boolean
        default: false

jobs:
  collect:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run MCP collector
        env:
          GITHUB_TOKEN:            ${{ secrets.GITHUB_TOKEN }}
          ANTHROPIC_API_KEY:       ${{ secrets.ANTHROPIC_API_KEY }}
          GENERATE_DESCRIPTIONS:   ${{ github.event.inputs.generate_descriptions }}
        run: npm run collect

      - name: Commit and push if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add packages/registry.json
          if git diff --staged --quiet; then
            echo "변경사항 없음 — 커밋 건너뜀"
          else
            git commit -m "chore: auto-collect MCPs $(date -u +'%Y-%m-%d')"
            git push
          fi
